<?xml version='1.0' encoding='utf-8'?>
<widget id="com.esp32.c3.pro" version="1.0.0" 
    xmlns="http://www.w3.org/ns/widgets" 
    xmlns:cdv="http://cordova.apache.org/ns/1.0"
    xmlns:android="http://schemas.android.com/apk/res/android">
    
    <name>ESP32-C3 Controller Pro</name>
    <description>Advanced controller for ESP32-C3.</description>
    <author email="dev@example.com">ESP32 Developer</author>

    <content src="index.html" />
    <access origin="*" />

    <!-- DEFINISI ADAPTIVE ICON -->
    <platform name="android">
        <icon density="ldpi" src="res/android/foreground.png" background="res/android/background.png" />
        <icon density="mdpi" src="res/android/foreground.png" background="res/android/background.png" />
        <icon density="hdpi" src="res/android/foreground.png" background="res/android/background.png" />
        <icon density="xhdpi" src="res/android/foreground.png" background="res/android/background.png" />
        <icon density="xxhdpi" src="res/android/foreground.png" background="res/android/background.png" />
        <icon density="xxxhdpi" src="res/android/foreground.png" background="res/android/background.png" />

        <preference name="AndroidXEnabled" value="true" />
        
        <config-file parent="/manifest" target="AndroidManifest.xml">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.VIBRATE" />
            <uses-permission android:name="android.permission.WAKE_LOCK" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
            <application android:usesCleartextTraffic="true" />
        </config-file>
    </platform>

    <preference name="BackgroundColor" value="#FF0B0E17" />
    <preference name="Orientation" value="portrait" />
</widget>
