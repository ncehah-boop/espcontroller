name: Build Android Debug APK (Alternatif)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v4
      - run: yes | sdkmanager --licenses || true
      - run: npm install -g cordova
      - run: |
          cordova create espapp com.example.espcontroller "ESP Controller"
          cd espapp
          cp ../index.html www/index.html
          cordova platform add android@13.0.0   # versi stabil
          
          cordova plugin add cordova-plugin-background-mode
          cordova plugin add cordova-plugin-local-notification
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-androidx
          cordova plugin add cordova-plugin-androidx-adapter
      - run: cd espapp && cordova build android --debug
      - uses: actions/upload-artifact@v4
        with:
          name: esp-controller-debug
          path: espapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
