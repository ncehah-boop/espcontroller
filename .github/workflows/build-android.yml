name: Build Android Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova & dependencies
        run: |
          npm install -g cordova
          sudo apt-get update
          sudo apt-get install -y default-jdk android-sdk

      - name: Set up Android SDK and install build-tools
        run: |
          export ANDROID_HOME=/usr/lib/android-sdk
          export PATH=$PATH:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools" >> $GITHUB_ENV
          # Install build-tools 36.0.0 yang dibutuhkan
          sdkmanager "build-tools;36.0.0" || true
          # Setujui lisensi (penting agar build tidak gagal)
          yes | sdkmanager --licenses || true

      - name: Create Cordova project & add plugins
        run: |
          cordova create espapp com.example.espcontroller "ESP Controller"
          cd espapp
          # Salin file HTML utama
          cp ../index.html www/index.html
          # Tambahkan platform android
          cordova platform add android@latest
          # Tambahkan plugin yang diperlukan
          cordova plugin add cordova-plugin-whitelist
          cordova plugin add cordova-plugin-background-mode
          cordova plugin add cordova-plugin-local-notification
          cordova plugin add cordova-plugin-android-permissions   # nama benar
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-androidx
          cordova plugin add cordova-plugin-androidx-adapter

      - name: Build Android Debug APK
        run: |
          cd espapp
          cordova build android --debug --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp-controller-debug
          path: espapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
