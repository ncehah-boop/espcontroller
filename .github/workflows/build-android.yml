name: Build Android Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Menggunakan Ubuntu 22.04 untuk kompatibilitas toolchain terbaik

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Setup Android SDK 34
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV
          
          # Menginstal SDK 34 secara spesifik
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" "cmdline-tools;latest"

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Generate App Icon
        run: |
          mkdir -p res/android
          # Membuat ikon PNG sederhana berwarna biru
          node -e "
            const fs = require('fs');
            // Base64 dari ikon placeholder (biru solid)
            const iconBase64 = 'iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAACXBIWXMAAARnAAAEZwHCAKQrAAAAJElEQVR4nO3BMQEAAADCoPVPbQwfoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIC3Ac+QAQF9VjYhAAAAAElFTkSuQmCC';
            fs.writeFileSync('res/android/icon.png', Buffer.from(iconBase64, 'base64'));
            console.log('Icon generated at res/android/icon.png');
          "

      - name: Create Cordova project & configure
        run: |
          cordova create espapp com.esp32.c3.pro "ESP32-C3 Controller Pro"
          cd espapp
          
          cp ../config.xml config.xml
          cp ../index.html www/index.html
          cp -r ../res res

          # Menggunakan android@13.0.0 yang lebih stabil daripada @latest (v15)
          cordova platform add android@13.0.0
          
          # Plugin wajib
          cordova plugin add cordova-plugin-androidx
          cordova plugin add cordova-plugin-androidx-adapter
          cordova plugin add cordova-plugin-splashscreen
          
          # Plugin fungsional
          cordova plugin add cordova-plugin-background-mode
          cordova plugin add cordova-plugin-local-notification
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-android-permissions

      - name: Ensure Launcher Intent Filter
        run: |
          cd espapp
          MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.intent.category.LAUNCHER" "$MANIFEST"; then
            echo "Fixing missing LAUNCHER category..."
            sed -i '/<activity android:name="MainActivity"/a \
              <intent-filter>\
                <action android:name="android.intent.action.MAIN" />\
                <category android:name="android.intent.category.LAUNCHER" />\
              </intent-filter>' "$MANIFEST"
          fi

      - name: Build Android Debug APK
        run: |
          cd espapp
          cordova build android --debug --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-c3-controller-debug
          path: espapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
