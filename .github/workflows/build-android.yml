name: Build Android Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Setup Android SDK Environment
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Install Required Android Packages
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Generate App Icon using Node.js
        run: |
          mkdir -p res
          # Membuat file PNG sederhana menggunakan Node.js tanpa library eksternal
          node -e "
            const fs = require('fs');
            // Header PNG + IHDR chunk + IDAT chunk sederhana untuk ikon biru 1x1 pixel (di-scale oleh Android)
            // Untuk hasil terbaik, kita buat SVG lalu convert, tapi karena tidak ada tool, 
            // kita gunakan script kecil untuk membuat file biner PNG yang valid.
            // Namun, cara termudah di CI tanpa tool adalah menggunakan base64 dari ikon default Cordova.
            
            // Base64 dari ikon Cordova default (biru)
            const iconBase64 = 'iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAACXBIWXMAAARnAAAEZwHCAKQrAAAAJElEQVR4nO3BMQEAAADCoPVPbQwfoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIC3Ac+QAQF9VjYhAAAAAElFTkSuQmCC';
            const buf = Buffer.from(iconBase64, 'base64');
            fs.writeFileSync('res/icon.png', buf);
            console.log('Icon generated successfully at res/icon.png');
          "

      - name: Create Cordova project & configure
        run: |
          cordova create espapp com.esp32.c3.pro "ESP32-C3 Controller Pro"
          cd espapp
          
          # Salin file konfigurasi dari root repo
          cp ../config.xml config.xml
          cp ../index.html www/index.html
          
          # Salin folder res yang berisi ikon
          cp -r ../res res

          # Tambahkan platform Android
          cordova platform add android@latest
          
          # Tambahkan plugin inti
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-androidx
          cordova plugin add cordova-plugin-androidx-adapter
          
          # Tambahkan plugin fungsional
          cordova plugin add cordova-plugin-background-mode
          cordova plugin add cordova-plugin-local-notification
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-splashscreen

      - name: Build Android Debug APK
        run: |
          cd espapp
          cordova build android --debug --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-c3-controller-debug
          path: espapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
