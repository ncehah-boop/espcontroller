name: Build Cordova Android Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Mengunduh kode dari repositori ke mesin build
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Setup Java JDK 17 (Wajib untuk Android SDK modern)
      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Setup Node.js v20
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. PEMBERSIHAN MENDALAM (Cache, Sisa Android, Sisa Plugin, & Node Modules)
      # Langkah ini menghapus sisa folder lama jika tidak sengaja ter-commit ke repositori
      - name: Deep Clean Workspace & Cache
        run: |
          echo "Memulai pembersihan workspace secara menyeluruh..."
          rm -rf platforms/
          rm -rf plugins/
          rm -rf node_modules/
          rm -f package-lock.json
          npm cache clean --force
          echo "Pembersihan selesai."

      # 5. Memasang Cordova CLI secara global
      - name: Install Cordova CLI
        run: |
          npm install -g cordova

      # 6. Memasang ulang dependensi proyek yang bersih
      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      # 7. Menambahkan Plugin Cordova (Menggunakan versi fork modern agar tidak crash)
      - name: Add Cordova Plugins
        run: |
          cordova plugin add @globules-io/cordova-plugin-background-mode --force
          cordova plugin add @moodlehq/cordova-plugin-local-notification --force
          cordova plugin add cordova-plugin-android-permissions --force
          cordova plugin add cordova-plugin-vibration --force

      # 8. Menambahkan ulang platform Android yang baru
      - name: Add Android Platform
        run: |
          cordova platform add android

      # 9. Membersihkan gradle dan sisa build Android internal
      - name: Clean Android Platform Build
        run: |
          cordova clean android

      # 10. Menyiapkan (prepare) aset dan plugin ke platform Android
      - name: Prepare Android Platform
        run: |
          cordova prepare android

      # 11. Memulai proses kompilasi APK versi Debug
      - name: Build Debug APK
        run: |
          cordova build android --debug

      # 12. Mengunggah file APK hasil kompilasi sebagai berkas Artifact GitHub
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: platforms/android/app/build/outputs/apk/debug/*.apk
