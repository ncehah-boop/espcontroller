name: Build Android Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install specific build-tools (36.0.0)
        run: |
          sdkmanager "build-tools;36.0.0"
          yes | sdkmanager --licenses || true

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova project & add plugins
        run: |
          cordova create espapp com.example.espcontroller "ESP Controller"
          cd espapp
          cp ../index.html www/index.html
          cordova platform add android@latest
          cordova plugin add cordova-plugin-whitelist
          cordova plugin add cordova-plugin-background-mode
          cordova plugin add cordova-plugin-local-notification
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-androidx
          cordova plugin add cordova-plugin-androidx-adapter

      - name: Build Android Debug APK
        run: |
          cd espapp
          cordova build android --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp-controller-debug
          path: espapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
