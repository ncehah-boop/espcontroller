name: Build Cordova Android Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Memungkinkan build dijalankan secara manual dari tab Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Mengunduh kode dari repositori ke mesin build
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Setup Java JDK 17 (Kebutuhan wajib untuk cordova-android versi terbaru)
      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Setup Node.js v20
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Memasang Cordova CLI secara global
      - name: Install Cordova CLI
        run: |
          npm install -g cordova

      # 5. Memasang dependensi proyek (jika ada package.json)
      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      # 6. Menambahkan Plugin Cordova yang dibutuhkan oleh aplikasi Anda
      - name: Add Cordova Plugins
        run: |
          cordova plugin add cordova-plugin-background-mode --force
          cordova plugin add cordova-plugin-android-permissions --force
          cordova plugin add cordova-plugin-vibration --force
          cordova plugin add cordova-plugin-local-notification --force

      # 7. Menambahkan platform Android ke proyek Cordova
      - name: Add Android Platform
        run: |
          cordova platform add android

      # 8. Membersihkan platform Android sebelum build
      - name: Clean Android Platform
        run: |
          cordova clean android

      # 9. Menyiapkan (prepare) platform Android
      - name: Prepare Android Platform
        run: |
          cordova prepare android

      # 10. Memulai kompilasi APK versi Debug
      - name: Build Debug APK
        run: |
          cordova build android --debug

      # 11. Mengunggah file APK hasil kompilasi sebagai berkas Artifact GitHub
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: platforms/android/app/build/outputs/apk/debug/*.apk
