name: Build Android Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Menggunakan API 33 dan Build-tools 33.0.2 yang lebih stabil di CI
          packages: |
            platforms;android-33
            build-tools;33.0.2
            platform-tools

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Create Cordova project & configure
        run: |
          cordova create espapp com.esp32.c3.pro "ESP32-C3 Controller Pro"
          cd espapp
          
          # Salin file konfigurasi dari root repo
          cp ../config.xml config.xml
          cp ../index.html www/index.html
          
          # Tambahkan platform Android
          cordova platform add android@latest
          
          # Tambahkan plugin inti dan kompatibilitas
          cordova plugin add cordova-plugin-whitelist
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-androidx
          cordova plugin add cordova-plugin-androidx-adapter
          
          # Tambahkan plugin fungsional
          cordova plugin add cordova-plugin-background-mode
          cordova plugin add cordova-plugin-local-notification
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-android-permissions

      - name: Build Android Debug APK
        run: |
          cd espapp
          cordova build android --debug --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-c3-controller-debug
          path: espapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
